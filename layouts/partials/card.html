<article class="content-card">
  <a class="card-cover{{ if not .Params.cover }} card-cover--empty{{ end }}" href="{{ .RelPermalink }}" aria-label="Baca {{ .Title }}">
    {{ with .Params.cover }}
      <img src="{{ . | relURL }}" alt="" loading="lazy">
    {{ else }}
      <span>{{ substr (.Section | upper) 0 1 }}</span>
    {{ end }}
  </a>
  <div class="card-body">
    <div class="card-meta">
      <span class="eyebrow">{{ .Section | title }}</span>
      <time datetime="{{ .Date.Format `2006-01-02` }}">{{ .Date | time.Format ":date_medium" }}</time>
    </div>
    <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
    <p>{{ .Description | default .Summary | plainify | truncate 150 }}</p>
    <a class="text-link" href="{{ .RelPermalink }}">Baca selengkapnya <span aria-hidden="true">→</span></a>
  </div>
</article>
