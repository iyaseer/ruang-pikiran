<header class="site-header">
  <div class="shell header-inner">
    <a class="brand" href="{{ site.Home.RelPermalink }}" aria-label="Beranda {{ site.Title }}">
      <span class="brand-mark">RP</span>
      <span>
        <strong>{{ site.Title }}</strong>
        <small>{{ site.Params.tagline }}</small>
      </span>
    </a>
    <nav class="main-nav" aria-label="Navigasi utama">
      {{ range site.Menus.main }}
        <a href="{{ .URL }}"{{ if $.IsMenuCurrent .Menu . }} class="active" aria-current="page"{{ end }}>{{ .Name }}</a>
      {{ end }}
    </nav>
  </div>
</header>
