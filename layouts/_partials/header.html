<aside class="site-sidebar">
  <div class="sidebar-inner">
    <a class="site-title" href="{{ site.Home.RelPermalink }}">{{ site.Title }}</a>
    <p class="site-tagline">{{ site.Params.tagline }}</p>

    <nav class="main-nav" aria-label="Navigasi utama">
      <a href="{{ site.Home.RelPermalink }}"{{ if .IsHome }} class="active" aria-current="page"{{ end }}>Beranda</a>
      {{ range site.Menus.main }}
        <a href="{{ .URL }}"{{ if or ($.IsMenuCurrent .Menu .) ($.HasMenuCurrent .Menu .) }} class="active" aria-current="page"{{ end }}>{{ .Name }}</a>
      {{ end }}
    </nav>

    <div class="sidebar-meta">
      <a href="{{ `index.xml` | relURL }}">RSS</a>
      <span>© {{ now.Year }}</span>
    </div>
  </div>
</aside>
